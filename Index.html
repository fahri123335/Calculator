<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Enkriptor Sandi Rahasia</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff00; padding: 20px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 100px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-left: 4px solid #ff9900; }
        .label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        #output { word-break: break-all; font-weight: bold; color: #ff9900; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistem Sandi Spanyol</h2>
    <textarea id="inputTeks" placeholder="Masukkan kalimat untuk disandi..."></textarea>
    <button onclick="proses()">UBAH KE SANDI</button>

    <div class="result">
        <div class="label">Hasil Enkripsi:</div>
        <div id="output">-</div>
    </div>
</div>

<script>
    let kamus = {};

    // Membaca file database.txt
    async function loadDatabase() {
        try {
            const response = await fetch('database.txt');
            const text = await response.text();
            text.split('\n').forEach(line => {
                const [huruf, kata] = line.split(':');
                if (huruf && kata) {
                    kamus[huruf.trim().toLowerCase()] = kata.trim();
                }
            });
            console.log("Database dimuat!");
        } catch (e) {
            console.error("Gagal memuat database:", e);
        }
    }

    loadDatabase();

    function proses() {
        const input = document.getElementById('inputTeks').value.toLowerCase();
        let hasil = [];

        for (let char of input) {
            if (char === ' ') {
                hasil.push('-');
            } else if (kamus[char]) {
                hasil.push(kamus[char]);
            }
        }
        document.getElementById('output').innerText = hasil.join('-');
    }
</script>
</body>
</html>
